services:
  web:
    build: ./web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - '3001:3001'
    env_file:
      - ./api/.env
    environment:
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/warung_ai
      FAKE_MODE: '0'
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started
    restart: unless-stopped

  ai:
    build: ./ai
    expose:
      - '8001'
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ap-southeast-1
      FAKE_MODE: '1'
    # Note: No ports mapping - ai is internal only (BFF pattern)
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warung_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
